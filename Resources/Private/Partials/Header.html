<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light fixed-top" id="mainNav">
    <div class="container">
        <f:link.page pageUid="{settings.rootpage}" class="logo">
            <f:variable name="activeLogo">{logo -> f:or(alternative: settings.logo)}</f:variable>
            <f:variable name="activeLogoAlt">{logo_alt -> f:or(alternative: settings.logo_alt)}</f:variable>
            <f:variable name="activeLogoWidth">{logo_width -> f:or(alternative: settings.logo_width)}</f:variable>
            <f:variable name="activeLogoHeight">{logo_height -> f:or(alternative: settings.logo_height)}</f:variable>
            <f:variable name="activeLogoText">{logo_text -> f:or(alternative: settings.logo_text)}</f:variable>
            <f:if condition="{activeLogo}">
                <f:image src="{activeLogo}" width="{activeLogoWidth}" height="{activeLogoHeight}" alt="{activeLogoText}" class="logo-img logo-img-light" />
            </f:if>
            <f:if condition="{activeLogoAlt}">
                <f:image src="{activeLogoAlt}" width="{activeLogoWidth}" height="{activeLogoHeight}" alt="{activeLogoText}" class="logo-img logo-img-dark" />
            </f:if>
            <f:if condition="{activeLogoText}"><span>{activeLogoText}</span></f:if>
        </f:link.page>
        <button class="navbar-toggler navbar-toggler-right" type="button" data-toggle="collapse"
            data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false"
            aria-label="Toggle navigation">
            <f:translate key="menu" extensionName="ns_theme_cleanblog" />
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <f:if condition="{MainMenu}">
                <ul class="navbar-nav ml-auto">
                    <f:for each="{MainMenu}" as="item">
                        <li class="nav-item">
                            <a href="{item.link}" title="{item.title}" class="nav-link">{item.title}</a>
                        </li>
                    </f:for>
                </ul>
            </f:if>
        </div>
    </div>
</nav>
